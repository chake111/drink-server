server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/drink_order?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.drink.server.entity
  configuration:
    map-underscore-to-camel-case: true

# JWT 配置
jwt:
  secret: drink_order_secret_key_2026
  expiration: 86400000  # 24小时，单位毫秒

# 文件上传配置
drink:
  upload:
    path: ./upload/
    url-prefix: /images/
